services:
  - type: web
    name: biztrip-budget-guard-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./biztrip.db
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: GROQ_API_KEY
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: TEQUILA_API_KEY
        sync: false
